agent_name: intelia-data-agent
description: >
  Natural language data agent for the Intelia warehouse.
  Ask questions in plain English — Gemini writes the SQL, runs it, and returns
  a chart or table. No code required.

project_id: vishal-sandpit-474523
region: australia-southeast1

# ─────────────────────────────────────────────────────────────
# PRIMARY TABLE — optimised wide view for NL queries
# Answer ~80% of C-suite questions from this one table
# ─────────────────────────────────────────────────────────────
primary_table: gold.mart_executive_summary

# ─────────────────────────────────────────────────────────────
# ADDITIONAL DATA SOURCES
# ─────────────────────────────────────────────────────────────
data_sources:
  - table: gold.mart_revenue_summary
    description: >
      Pre-aggregated monthly revenue by country. Best for trend questions:
      "How did revenue change month over month?" or "Which country grew fastest?"

  - table: gold.dim_customers_analyst
    description: >
      Customer profiles with PII masked. Best for segment and churn questions:
      "How many At Risk customers are there?" or "Show me Platinum customers in Australia"

  - table: gold.fct_orders
    description: >
      Individual order transactions. Best for order-level questions:
      "How many orders were placed last week?" or "What is our average order value?"

  - table: gold.dim_products
    description: >
      Product catalogue with category and margin. Best for product questions:
      "Which product category has the highest revenue?" or "Show me active products by brand"

  - table: ai.customer_concierge
    description: >
      Gemini AI-generated retention strategies per customer. Best for AI insight questions:
      "What does Gemini recommend for churning customers?" or "Show me AI insights for Gold segment"

  - table: ai.product_upsell
    description: >
      Gemini AI-generated upsell strategies per product. Best for upsell questions:
      "What are the top cross-sell opportunities?" or "Show upsell strategies for Electronics"

  - table: governance.batch_audit_log
    description: >
      Pipeline run history. Best for operational questions:
      "When did the last pipeline run?" or "Have there been any pipeline failures today?"

  - table: governance.business_glossary
    description: >
      Definitions for all business terms in the warehouse.
      "What does churn risk mean?" or "Who owns the Revenue metric?"

# ─────────────────────────────────────────────────────────────
# SAMPLE QUESTIONS — copy/paste into BigQuery Data Agent chat
# ─────────────────────────────────────────────────────────────
sample_questions:

  revenue:
    - "What was our total revenue last month?"
    - "Show me revenue by country for the last 3 months"
    - "Which month had the highest revenue in the last year?"
    - "Compare this month's revenue to last month"
    - "What is the month-over-month revenue growth rate?"
    - "Show me the top 5 countries by revenue this quarter"

  customers:
    - "How many customers are at risk of churning?"
    - "Show me all Platinum segment customers"
    - "Which customer segment has the highest average order value?"
    - "How many new customers did we acquire this month?"
    - "Show me customers who haven't purchased in over 6 months"
    - "What percentage of customers have churned?"
    - "How many customers are in each churn risk category?"

  products:
    - "Which product category generates the most revenue?"
    - "Show me the top 10 products by order count in the last 90 days"
    - "Which products have low stock?"
    - "What is the most popular product brand?"

  ai_insights:
    - "Show me Gemini retention strategies for at-risk customers"
    - "What does Gemini recommend for our Gold segment customers?"
    - "Show AI upsell strategies for the Electronics category"
    - "Which customers have Gemini insights generated?"

  pipeline:
    - "When did the last pipeline run complete?"
    - "Have there been any pipeline failures in the last 7 days?"
    - "How many rows were merged in the last delta pipeline run?"
    - "Show me all pipeline runs for today"

# ─────────────────────────────────────────────────────────────
# CONSOLE SETUP — how to activate Gemini for BigQuery Data Agent
# ─────────────────────────────────────────────────────────────
console_setup:
  step_1:
    action: Enable Gemini for BigQuery
    where: "GCP Console → BigQuery → Settings → Gemini in BigQuery"
    toggle: "Enable Gemini features"

  step_2:
    action: Open BigQuery Studio
    where: "GCP Console → BigQuery → BigQuery Studio (not classic UI)"
    note: "Data Agent chat panel appears on the right side"

  step_3:
    action: Set data context
    where: "Data Agent panel → 'Select data sources'"
    select:
      - vishal-sandpit-474523.gold.mart_executive_summary
      - vishal-sandpit-474523.gold.mart_revenue_summary
      - vishal-sandpit-474523.ai.customer_concierge
      - vishal-sandpit-474523.governance.batch_audit_log

  step_4:
    action: Ask your first question
    example: "What was our total revenue last month and how does it compare to the month before?"
    expected: >
      Gemini generates SQL against mart_revenue_summary, runs it, and returns a
      bar chart showing MoM revenue with percentage change.

  step_5:
    action: Save useful queries as canvas cells
    note: "Click 'Add to canvas' on any result to pin it to a BigQuery Canvas"

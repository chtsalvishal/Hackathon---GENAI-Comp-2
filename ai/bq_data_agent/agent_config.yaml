# Native BigQuery Data Agent configuration
# Deploy via: gcloud bigquery data-agents create --config-file=agent_config.yaml

agent_name: intelia-warehouse-agent
display_name: "Intelia Warehouse Intelligence Agent"
description: >
  Conversational analytics agent for C-suite stakeholders.
  Ask questions in plain English about revenue, customers, products, and platform performance.

project_id: vishal-sandpit-474523
location: australia-southeast1

data_sources:
  - dataset_id: gold
    project_id: vishal-sandpit-474523
    description: "Business-ready dimension and fact tables"
    tables:
      - table_id: dim_customers
        description: "Customer profiles with LTV, segment, churn risk"
      - table_id: dim_products
        description: "Product catalogue with pricing and margins"
      - table_id: fct_orders
        description: "Order fact table — one row per order"
      - table_id: mart_revenue_summary
        description: "Pre-aggregated monthly revenue by country"
  - dataset_id: ai
    project_id: vishal-sandpit-474523
    description: "Gemini AI-enriched views"
    tables:
      - table_id: customer_concierge
        description: "Customer profiles with Gemini-generated personas and retention strategies"
      - table_id: product_upsell
        description: "Product listings with Gemini upsell/cross-sell strategies"
      - table_id: ai_enriched_profiles
        description: "Fully enriched customer profiles combining raw data and AI insights"
  - dataset_id: governance
    project_id: vishal-sandpit-474523
    tables:
      - table_id: batch_audit_log
        description: "Delta pipeline run history and status"

access_control:
  allowed_roles:
    - roles/bigquery.dataViewer
  deny_roles:
    - roles/bigquery.admin

sample_questions:
  - question: "What was our total revenue last month?"
    expected_tables: ["mart_revenue_summary"]
  - question: "Which customers are at risk of churning?"
    expected_tables: ["dim_customers"]
  - question: "What is the Gemini insight for our top customer?"
    expected_tables: ["customer_concierge"]
  - question: "Which product category generated the most revenue this quarter?"
    expected_tables: ["fct_orders", "dim_products"]
  - question: "Show me the 12-month retention trend"
    expected_tables: ["fct_orders", "dim_customers"]
  - question: "What percentage of queries are hitting AI views?"
    expected_tables: ["INFORMATION_SCHEMA.JOBS_BY_PROJECT"]
  - question: "When was the last delta pipeline run?"
    expected_tables: ["batch_audit_log"]

model_settings:
  model: gemini-1.5-pro
  temperature: 0.1
  max_output_tokens: 1024
